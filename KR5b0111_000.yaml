body:
  text: 拘三魂法一出上經靈書紫文中道士當先檢制魂魄消滅尸鬼常以月晦朔之日及庚申甲寅之日當清齋入室沐浴塵埃正席而坐得不眠者益佳當以眞朱筆㸃左目眥下以雄黄筆㸃右鼻孔下令小半入谷裏㸃畢叩齒三通祝曰二景飛纏朱黄散煙氣攝虚邪尸穢沉泯和魂鍊魄合形大神令我不死萬壽永全聰明徹視長亨利貞畢又叩齒三通咽液三過幷以右手第二指捻左目眥下又以左手第二指捻右鼻孔下各七過當隂按之勿舉手於是都畢按此二處是七魄遊尸之門戸妖精賊邪之津梁矣故受朱黄之精塞尸鬼之路二景之薰滅淫亂之氣此太極上法常能行之則魂魄安和尸穢散絶長生神仙通靈徹視行之三年色念都泯也此日名曰尸鬼競爭之日男女不得同席而坐愼之凡研味至道誦讀神經十言二十言輒三過䑛脣咽液百言五十言輒兩三過叩齒招神㑹靈安和血氣使靈津凝滿帝一欣宅所謂冲氣不勞昬而不泄凡道士不可泣淚及液泄此爲損液漏津使喉腦大竭是以眞人道士常以吐納咽味以和六液凡道士常當存思識巳之形容極使髣髴對在我前使面上常有日月之光洞照一形使日在左月在右去面前令九寸存畢啄齒三通祝曰元始上眞雙景二玄右拘七魄左拘三魂令我神明與形常存畢又叩齒三七通咽液七過此名爲帝君存形拘魂制魄之道使人聰明神仙長生不死若不得祝者亦可單存之耳凡月三日月十三日夕是此時也三魂不定爽靈浮遊胎光放形幽精擾喚其爽靈胎光幽精三君是三魂之神名也其夕皆棄身遊邀飊逝本室或爲他魂外鬼所見留制或爲魅物所得收録或不得還反離形放質或犯於外魂二氣共戰皆躁競赤子使爲他念去來無形心悲意悶也學生者皆當拘而留之使無遊逸矣拘留之法當安眠向上下枕伸足交手心上冥目閉氣三息叩齒三通存心有赤氣如雞子從内仰上出於目中從目中出外赤氣轉大覆身下流身體上至頭項變而成火因以燒身使帀一身令内外洞徹有如然炭之狀都畢其時當覺體中小熱乃大叩齒三通畢存呼三魂名爽靈胎光幽精三魂急住因微祝曰太微玄宫中黄始青内鍊三魂胎光安寧神寳玉室與我俱生不得妄動鑒者太靈若欲飛行唯得詣太極上清若欲饑渴唯得飲廻水玉精都畢也制七魄法二亦出紫文經中月朔月望月晦夕是此時也七魄流蕩遊走穢濁或交通血食往鬼來魅或與死尸共相關入或淫赤子聚姦伐宅或言人之罪詣三官河伯或變爲魍魎使人厭魅或將鬼入身呼邪殺質諸殘病生人皆魄之罪樂人之死皆魄之性欲人之敗皆魄之疾道士當制而厲之錬而變之抑而止之攝而威之其第一魄名尸狗第二魄名伏矢第三魄名雀隂第四魄名吞賊第五魄名蜚毒第六魄名除穢第七魄名臭肺此皆七魄之隂名也身中之濁鬼也制檢之法交手於項中閉息七過叩齒七通存鼻端有白氣如小豆須㬰漸大以罩身九重下至兩足上至頭上旣畢於是白氣忽又變成天獸使兩青龍在兩目中兩白虎在兩鼻孔中皆向外朱雀在心上向人口蒼龜在左足下靈蛇在右足下兩耳中有王女著玄錦衣當耳門兩手各把火光良乆都畢又咽液七過叩齒七通呼七魄名畢乃微祝曰素氣九廻制魄邪凶天獸守門嬌女執關鍊魄和柔與我相安不得妄動看察形原若汝饑渇聽飲月黄日丹都畢也於是七魄内閉相守受制若常行之則魄濁下消反善舍形上和三官與元合靈也辟惡夢法三出上經雌一五老經若數遇惡夢者一曰白妖二曰心試三曰屍賊厭消之方若夢覺以左手捻人中二七過啄齒二七通而微祝曰大洞眞玄張錬三魂第一魂速守七魄第二魂速守泥丸第三魂受心節度速啓太素三元君向遇不祥之夢是七魄遊尸來恊萬邪之源急召桃康護命上告帝君五老九眞皆守體門黄闕神師紫戸將軍把鉞握鈴潰滅惡精反凶成吉生死無縁畢若又卧必獲善應而向造爲惡夢之氣則受閉於天關之下也三年之後唯神感㫖應乃有夢也夢皆知見見將來之明審也無復惡占不祥之想矣若夜遇善夢者吉應夢而心中自以爲佳則吉感也卧覺當摩目二七遍叩齒二七通而微祝曰太上高精三帝丹靈絳宫明徹吉感告情三元守魄天皇授經所向皆合飛仙上清常與玉眞俱㑹紫庭畢此大洞祕法以傳於始渉津流者矣得吉夢法四亦出五老經尸學士夢想有婦女人衣紫羅衣持案食來受而食之勿畏惡之也此食盡是東海珍彩之屬或是嵩高五嶽中眞草甚少之藥食之可致壽延也凡道士白日眠卧先以兩手按目四眥三七遍叩齒三七通乃卧也凡道士暮卧當以左手按鼻兩孔三七遍叩齒三七通乃卧也安眠祝法五出上經黄素四十四方經道士臨眠手撫心三過閉目祝曰太靈九宫太一守房百神參位魂魄和同長生不死塞滅邪凶畢而寢制祝鬼魅法六出玉清消魔經凡道士行來獨宿有魔精惡鬼之地當叩左齒三十六通閉氣微祝曰太帝陽元四羅幽關千妖萬毒敢當吾前巨獸重吻刳腹屠肝神公使者守衞營番黄衣師兵斬伐妖魂馘滅千魔摧落凶姦絶種滅𩔖取令梟殘玉帝上命清蕩三元畢又叩齒三十六通名爲太帝揮神内祝塞滅萬魔之法齋見不祥之物法七亦出四十四方經道士齋入室有不祥之物者當行北帝祝畢方先叩左齒三十六通祝曰二象廻傾玄一之精七靈護命上詣三清雙皇驅除嚇伯羅兵三十萬人侍衞神營巨獸百丈吐威攝精揮劒逐邪馘落魔靈神伯所祝千妖滅形畢又叩齒三十六通鍊祝死尸法八出上經青要紫書金艮巠紫書訣言凡修上清之道兆身父母伯叔兄弟於世上死亡兆身未得絶跡故在人中身履死殗者三日當取清水一盆眞珠一兩投於水中兆於中庭南向臨水上叩齒九通祝曰氣化成神尸變入玄三化五體昇入九天九天之劫更度甲身甲身更化得爲眞人畢男死思玉童三人女死思玉女七人盛甕水以灌死人之尸畢取水自洗手面仰天噴漱畢又隂祝曰天氣巳清人化巳生得生上天九變更形五苦三塗斷落死名超度窮魂還返南庭止如此亡人即更受化生於九天之上九年得昇玊清之官其法妙於大洞度七祖之法玉帝所祕不傳非眞有金名帝圖緑字紫文得見此文勿輕施用妄告於人七祖父母長閉鬼官三塗五苦萬劫不原四極明科七伯年有眞人聽傳行道見他死尸法九亦出青要經紫書訣言凡上學之士遊更世路忽於道次遇見死尸穢氣干身兆當行二十四歩止此向叩齒九通男尸思玉童三人女尸思玉女七人來請兆王谷之中皇芝素水以灌彼死尸之上須㬰存死尸化生成人便隂祝曰巳枯復榮巳滅復生得生上天更禀太靈九天之劫反覆胎嬰穢累盪滅白尸反生畢以手拭目二七過止如此穢氣即解死人即更受化後爲靈人兆遇二十四過行鍊祝功滿德加名標上清二十四年剋乗靈輪飛行九玄也占居山宅吉凶法十出上經外國放品經洞淵九地三十六音内銘出外國放品經占道士欲居山宅及居家宅舍吉凶法洞淵九地三十六音内銘第一壘色潤地正音行音遊音梵音各一第二壘四音亦各一第三壘音第四壘音第五壘音第六壘音第七壘音第八壘音第九壘音欲登山住止及安居宅審地吉凶當以戊已之日黄書九地三十六音文白紙上置所住中央以盆覆之三宿開看若有黄色潤紙大吉若有青色則下有死靈之尸若有白色者凶若有赤色者驚恐若有黒色者則有財寳若有紫色者得神仙都不異則止可三年安過此必折傷施用神䇿法十一出靈寳眞文經下卷元始太眞素靈高尊太帝皓映洞朗八門五老告命無幽不聞上御九天中制酆山下領河海十二水源八威神呪靈䇿玉文召龍負水收氣聚靈束魔送鬼掃蕩妖羣萬精摧落所誅無蠲日月五星北斗七元諸天諸地諸水諸山玉眞所部冥靈大神仙王遊宴五帝仗幡天丁前驅金虎後奔玃天猛獸羅備四門所呼立到所召立前赤書煥落風火無間有所攝録金龍驛傳畢叩齒九通仰天三嘯引天氣三咽八威䇿文指所告之地閉氣九息而止施用神杖法十二出靈寳經玉訣上卷道士欲施用神杖法當叩齒三十六通思五帝直符吏各一人衣隨方色有五色之光流煥杖上五帝玉女各一人合侍衞杖左右微祝曰太陽之山元始上精開天張地甘竹通靈直符守吏部衞神兵五色流煥朱衣金銘輔翼上眞出幽入冥招天天恭攝地地迎指鬼鬼滅妖魔束形靈符神杖威制百方與我俱滅與我俱生萬劫之後以代我形景爲五解神昇上清承符告命靡不敬聽畢引五方氣二十咽止以杖指天天神設禮以杖指地地祇司迎以杖指東北萬鬼束形救助日蝕法十三亦出青要經紫書訣言是日當露出中庭以明鏡向日兆身操大刀一口南向叩齒三十六通仰祝曰日暉童子陽光赤精耀羅眞人影中玉靈歷運乗氣上下肅清隂圓内謀上侵日庭天鑒操杖帝臣輔兵三五正位陽光洞明天地代蝕何假敢生各反其位無使虧盈玉帝告命靡不敬停便引炁二十四息止如此則天地復位三五齊光童子感恱日暉廻靈流光玄注陶降兆身列名紫簡紀篇玉清九年之内得乗緑軿乗空駕虚飛行上清也救助月蝕法十四亦出青要經紫書訣言月蝕之日是其夕當出中庭取清水一盆兆身操刀一口臨水向月叩齒十六通仰祝曰天地離合圓氣乗虧侵蝕月廬上干黄輝帝臣操杖玊晨捕非天兵羅成神公放威有何假生附景乗微速反初位無使有違三過向月祝如此以刀右還盆水三過上臨水引氣十六息畢月蝕即解天景肅清三五齊輝萬宫安寧也月中眞人夫人靈光感恱意歡廻靈玄映降子之情即記北帝落子死名注上青宮玉篇給子玉女十二人侍衞兆身九年如此得乗飛霞上造月庭其道至妙不行於世得者寳祕愼勿輕傳上經解殗法十五亦出四十四方經凡道士見死尸血穢之物當以朱一銖散納水中以洗目漱口洗手足畢入室正寢交手心上叩齒二七通心拜四方祝曰三元上道太一護形司命公子五神黄寧血尸散滅凶穢沉零七液纏注五藏華生令我神仙長亨利貞祝畢閉兩目屏氣良乆身中小熱爲候竟又叩齒七下咽液三過此三元解穢内法也理髮及沐頭祝法十六亦出四十四方經凡道士理髮將髻及沐頭將散髮之時先啄齒七通乃祝曰太帝散華玄歸大神今時吉日理髮沐塵辟惡除患長生神仙畢乃髻之竟又叩齒七通都畢此名爲太帝散華理髮内法令人終年不病耳目聰明頭腦不痛浴身及洗手面法十七亦出四十四方經凡道士浴身及洗手面之時先臨水啄齒三通乃祝曰四大開朗天地爲常玄水澡穢辟除不祥𩀱皇守門七靈安房雲津鍊灌萬氣混康内外利貞保兹黄裳祝畢又叩齒三通乃洗手面此名爲澡穢除凶七房祝法常能行之者使人神明血淨辟諸凶氣齋食先祝法十八亦出四十四方經凡道士入室齋戒之時臨食常以左手持筯㧻盤三通乃祝曰二玄上道四極清泠太一帝君百神黄寧受糧三官灌漑脾靈上饗太和餐味五馨魂胎受命七液流停百關通和五藏華明𩀱皇合景飛行上清食畢又㭬盤二過此名爲魂胎受馨百神饗糧之道常能行之令人神明氣和魂魄安寧辟惡除試常保利津未食祝之凡道士臨於盛饌皆正心存一目想一先飲食然後乃食之食畢心微祝曰百榖入胃與神合氣鎭補血液尸邪亡墜飛登天闕長生天地役使六丁靈童奉衞止常如此者則邪氣逺退眞氣來前也食竟祝之道士自按摩法十九道士自按摩頭面之法求道要先令目清耳聰爲事主也且耳目是尋眞之梯級綜靈之門戸得失繫之而立存亡須知而辯也大鈔相示可施用也以手按兩眉後小穴中三九過又以手心及指摩目下顴上又以手旋耳行三十過次以手逆乗額三九過口傍咽液多少無數也如此常行耳目清明於人中宻爲之勿語其狀次以兩手乗頭四面順髮就結唯多也於是頭血流散風濕不凝都畢以手按目四皆二九過覺令見光分明是檢眼神之道常爲之得見百靈道士傳授先求感應法二十出四十四方經凡傳授上法之時有經之師當先求感應然後傳之當入室燒香宻禱神明乃心拜經前微祝曰太上元君仙都大神今日吉日八願開陳欲傳上法敢告靈元未知可否須應乃宣祝畢便寢必獲靈應子自知其善否之心審可授之方也玉帝祝鬼衞靈上法二十一出四十四方經玉帝祝曰九天有命上奉玉清促召千眞俱㑹帝庭太一下觀𩀱皇翼形鑒察萬邪理氣攝生若有不祥干試神明青帝之道飭整神兵七神秉鉞天鋒右征揮劒前驅煥擲火鈴檄命甲騶武卒天丁風火齊戰伐邪絞精上威六天下攝魔靈旣威旣攝萬凶滅形神戈電掃姦妖無生仙皇秉節有令敢停拒節違令是誅是刑各警各愼保兹黄寧九天告命萬神敬聽畢兆若夜行畏恐心震意怯或惡夢之時魔鬼試人犯眞干氣欲疾病害人者急行玉帝祝鬼衞靈之法兆當心存至道求濟於帝一乃北向叩齒三十通閉氣審祝祝畢又叩齒如上咽液十過於是姦惡消摧羣魔伏滅七神纏綿太一鑒攝萬靈衞眞外威凶氣亦可日日諷習振嚮唱誦坐卧隨意以塞百邪之來試閉姦鬼之凶跡當卧寢亦常可誦之令人神安意明辟夢除厭消諸毒惡使終身不恐諷習之日不復北向閉氣也以閉氣宻祝者謂鬼魔巳試其左右妖精巳干其神室故勑靈命眞以收其凶跡耳而寢卧之祝不復同之於此法也道士叩齒節度法二十二凡上清叩齒咽液之法皆各有方先後有次不得亂雜使眞靈混錯也夫叩齒以命神咽氣以和眞納和氣咽六液以運入制神須鳴鼓而整行列矣凡存修上法禮祝之時皆先啄齒上下相叩勿左右也一呼一吸令得咽諸氣液耳此名爲呼神和眞以求昇仙者也其法叩齒上下相叩名曰天鼓左齒相叩名曰天鐘右齒相叩名曰天磬也制鬼召魔可叩鐘磬行道求眞叩天鼓也道士聞耳鳴祝法二十三出上經大有妙經聞耳鳴者錯手掩耳而祝曰赤子在宮九眞在房請聽神命亦察不祥太一流火以滅萬凶祝畢以手掩耳門一七過畢當聞面熱即佳候也若聞頭頸間𤶬𤶬寒者惡氣入也當急卧臨目存玄丹宮太一眞君以流火之鈴煥而擲之令惡氣即出耳外火光亦隨之在後烱烱然以照一身良乆平復也審察耳鳴吉凶法二十四亦出大有妙經耳中忽聞瀬水聲雷電及鼓鳴者是體中勞損心藏極弊不能味眞注生而淫放喪亂使六府失攝魂魄哀號蓋將結疾致死亡之兆矣是以泥丸縱法九宮失常悲擾翻錯鳴鼓亂行將欲寫其居館以棄一身也聞之者當精念反迷還專眞心若罪未深者自聽攺也所以耳聾者耳神亡之故也耳中忽聞金聲玊音者眞氣來入道欲成也忽聞絃樂之聲者六丁玉女來衞子道也當隱靜專修所行勤至之心愈彌於往也眞人因是遂有形見之漸矣自非爾師且勿言於他人矣耳中聞簫角之音吉象貴至也聞呌喚號呼之聲者凶象敗至也聞𦤀氣者必有殗穢之事急更沐浴燒香掃除寢宇此是帝君將戒勸於人者也若聞血氣者及無故見聚血者兵凶也急遁人間存三元帝君求救自藏齋三月禍亦止也此皆帝君先告人吉凶以令懼戒其禍福耳夫見凶象當行隂德營於惠救爲人所不能爲行人所不能行者始免乎必死之候也子其朂之勿守常而已施安齋堂五方符法二十五出金眞玉光經安齋堂五方招靈致眞攝魔之符書符都畢先北向叩齒三十六通微祝曰九天有命普告萬靈三代相推五氣交幷玊帝顯駕匡轡霄庭施布正法收魔束精翦戮元妖萬道齊平道流後學帝君記名招眞洞幽氣交無形變景鍊道昇上三清得迅飛輿上造玉庭畢隨位置符眞仙立降身無禍殃學無此道鮮不喪身可謂妙法不學自仙也行道服氣存思三眞法二十六上元宮泥丸中其神赤子字元先一名帝卿中元宮絳房中心是也其神眞人字子丹一名光堅下元丹田宮臍下三寸也其神嬰兒字元陽子一名谷玄此三一之神矣欲拘制魂魄時皆先隂呼其名存三神皆玉色金光有嬰孩之貌中上二元皆衣赤下元衣黄頭如嬰兒始生之狀行道服氣時亦存名字仙禁七傷法二十七出上經七聖玄紀凡學士玄記有名身合仙相則應自然合眞而有第一之傷帶眞行僞淫色喪神魂液泄漏精光枯乾氣散魄零骨空形震神泣窮府上聞天關眞仙逺遊則與九塵結因土府同符豈復得仙第二之傷外形在道皮好念眞而心抱隂賊凶惡内臻願人否敗嫉能妬賢口羙心逆面歡内嗔形論得失妄造罪原毀謗同學攻伐師根三官所記標爲惡門仙眞高逝邪魔攻身走作形景飛散體神故令枉横極其惡原考滿形灰滅巳九泉縱有玄名豈保自然第三之傷飲酒沉醉損氣喪靈五府攻潰萬神震驚魂魄飛散内外朽零本室空索赤子悲鳴眞仙高逝邪魔入形如此之學徒損精誠雖有玄記空室玉名神昇上宫身灰幽冥恍惚求延年焉乆停第四之傷行不匡物責人宗仰心忿口形罵詈無常瞋喜失節意性乖常氣激神散内眞飛揚魄離魂遊九孔塵埃五府奔喪皆由性之不純行之不祥眞仙高逝外痾入形如此之學將欲何蒙雖有玄圖不免斯殃望仙日悠地里日長第五之傷或玄圖表見得受寳經或運遇靈師啓授神文而不依科盟形泄天眞未經九年投剌名山使青宫有録金闕結篇便傳於人流散世間輕眞泄寳考結巳身徒有玄名反累七玄仙道高逝身死幽泉長充鬼責萬劫不原第六之傷身履殗穢形景不香内無清虚外無蘭芳清靈失眞神不居房氣擾精混靈元失光五神飛散赤子騫揚邪魔來攻内外交喪如此之學望成反傷眞仙高逝空景獨行淪於混濁仙乎何蒙第七之傷啖食一切含生之肉殺害足口之羙𦤀氣充於藏府伐生形於非巳眞氣擾於靈門遊神駭於赤子魂魄逝於宫宅濁滯纏於口齒仙眞高登於玉清巳身沉頓於地里徒有玄名於帝簡亦不免於必死高聖帝君曰爲學之本當以七傷爲急旣得瞻盻洞門披覩玉篇不犯七傷之禁將坐待靈降白日昇晨如外勤在學内不遣於七傷者將望仙而反敗期生而反亡希吉而反凶期飛而反沉靈仙逝於高清五神散於八荒赤子號泣於中宅遊魂悲鳴於玄空故仙相有成敗上學有七傷篤尚之士孰清其眞仙相十敗法二十八出上經靈書紫文經第一敗勿好淫淫則魂液外漏精光枯竭神燋魄散骨薄髓穢魂號靈府上聞天關三宫權爭胎英悲錯此一敗仙相第二敗勿爲隂賊凶惡凶惡則黄庭競亂三尸好殺魂神窺姦魄鬼干室目光亡散口生傷氣此二敗仙相第三敗勿醉酒醉酒則形質淪壊神眞交錯魂忘本室魄遊邪宅赤子飛鳴喉腦火灼此三敗仙相第四敗勿穢慢不淨穢慢不淨則清靈失眞精魂不居三宫生蟲赤子浮游血濁髓𦤀神光失廬魄走邪門求我死書此四敗仙相第五敗勿食一切含生之肉食則元形喪始根本亡度胎神號泣絳君呌慕三魂慘毒魄索丘墓此肉入口命墜長夜此五敗仙相第六敗勿食一切水中有生之肉食則形神犯眞泥丸滅落三宫閉門嬰兒交錯魂爽飛遁魄求棺槨此六敗仙相第七敗勿食飛鳥肉食則氣形聲𦤀精靈濁滯腦黄齒枯脾育死氣魂不受眞魄生邪勃身沉長淵骨隨土没此七敗仙相第八敗勿食五辛之菜食則五藏惡𦤀三華潰亂神不上達精胎下淪魂魄生離赤子煩頓飛靈失守眼光流遁此八敗仙相第九敗勿殺昆蟲以上殺則兵對萬物束骸血怨形暴魄凶魂氣交戰胎靈傍偟眞兒逃散泥丸姦狂赤子棄叛尸形湯鑊水煑火爛此九敗仙相第十敗勿北向便曲仰視三光勿北向理髮解脫衣裳勿北向唾罵犯破毀王破謂歲下辰也王謂玉氣之所在也勿怒日月星辰勿以八節日行威刑勿以月朔日怒恚勿以六甲日傷龜龍鱗甲之物勿以丙午日傷雉勿以丙子日傷黒獸勿以庚申日别有他念當存思念眞勿以乙卯日飲酒食肉當齋潔靜心勿以正月殺生勿以二月九日食肉勿以三月三日食諸百草心勿以四月八日殺草伐樹勿以五月五日見血勿以六月六日起土勿以七月七日思存惡事勿以八月四日巿獲履屐諸附足之物勿以九月九日起牀席勿以十月五日罰責人物勿以十一月十一日不沐浴勿以十二月晦内三日不齋燒香念眞也諸如此忌天人大禁三官告察以是爲重罪矣或令人三魂相疾七魄流競或胎神所憎三宮受惡之時也是以惡夢交於丹心妖鬽乗其朱闕精液觸犯神眞恍惚流變多禁莫識忌術子能奉修則爲仙才不奉天禁則爲傷敗者也上清法服二十九出太上黄素四十四方經上清法服紫青作帔紫於外青於内帔長四尺九寸以應四時之數廣五尺五寸以法天地之氣表裏一法表當令二十四條裏令一十五條以應三十九帝眞之位爾者身佩帝星之服故也無此服不得妄動寳經此法服給玉童十二人不得妄借異人并犯殗穢輕慢神服女子紫紗之褐令用二丈四尺身袖長短就令取足當使兩袖作十六條身中二十三條合三十九條又作青紗之裙令用四十五尺作八幅幅長四尺九寸餘作攀腰分八幅作三十二條此則飛青之裙也無此服不得詠於上清寳經此法服給玉女十二人不得妄借異人并犯殗穢輕慢神服道士遊行山澤祝法三十出消魔經道士遊行五嶽履渉川澤當行三天正一之祝威試召靈致仙之法登山之初當先於山外叩齒九通閉眼思五色之雲勃勃四㑹奄冠一山及我身在雲氣之中良乆見五獄仙官及山林草木川澤禽獸萬物悉來朝巳仰祝曰上帝出遊日吉時良玉華覆蓋太一扶將左翼白元右輔無英八帝九眞陵梵履昌導我送我與我同光履行五嶽羣仙奉迎出入河海萬道開張役御六丁足躡五行三天有命盪除萬凶豁落掃穢流金滅殃正法清通嚴如威霜華精奕奕龍輿昻昻流青翠羽飛錦羅裳所向所之靡不吉昌萬眞來朝齊昇玉京畢引炁三十六咽止行此千日得五嶽眞仙降雲車羽蓋飛行太空凡道士入山良月吉日禁忌之法道士欲入山以三月七月吉又法春不東山及西山夏不南山北山秋不西山東山冬不北山南山入山良日保義專日吉制伐日並凶甲子丙寅丁卯巳巳辛未壬申癸酉乙亥庚辰辛丑庚戌戊午此是保日吉丁丑丙戌甲午庚子壬寅癸卯乙巳丁永戊申巳酉辛亥丙辰此是義日吉戊辰巳丑戊戌丙午壬子甲寅乙卯丁巳巳未庚申辛酉癸亥此是專日吉乙丑甲戌壬午戊子癸己甲辰庚寅辛卯乙未丙申丁酉巳亥此是制日凶庚午丙子戊寅巳卯辛巳癸未甲申乙酉丁亥壬辰癸丑壬戌此是伐日凶道士若卒遇凶惡不祥當叩天鐘三十六通叩左齒也道士若經山辟邪威神大祝當叩天磬三十六通叩右齒也若存思念道致眞招靈當鳴天鼓三卜六通叩上下齒也凡道士獨宿山林而多爲山精惡鬼所犯試者當叩齒二十七通閉氣祝曰吾昨被帝召攝領眞元令我封掌此嶽摧割酆山萬靈受事俱㑹帝前七神啓别三元司眞若有小妖即時梟殘山精澤尉速來奉迎神師奉命上聞三清一如大洞之法不得稽停祝畢又叩齒二七下此爲帝君補神祝伐山精百鬼之法諸山神地祇房祠主正之神聞此之祝皆執鞭奉迎神兵侍衞若與萬人同宿矣凡受三品上道或未得上登三清受號仙王者多爲天魔所試萬靈所干也宜詠拂魔之祝上動上天之靈音下召三界之威神束萬精於天鐘斬妖魔於洞章行此之法常當北向先思項生圖象如日左有朱鳯右有玄龍紫霞覆蓋光映身形仙童玉女執五色之節從三界萬神前嘯九鳯後吹八鸞白虬啓道太極參軒畢叩左齒三十六通次叩右齒二十四通次叩上下齒十二通而祝曰羅天毒獸備巨四門吞沉割膽山醜萬羣張喉玃天猛馬高奔毒龍奮𤓰金頭横吞威兵巨萬受符校仙六天不拘合凶成羣妖魔鼓洋穢炁紛紛謡歌空洞亂音陣雲小鬼現形當人生門神王所告無幽不聞上攝六氣下檢河源五嶽四瀆善惡速分萬萬千千來對我前五帝校録有功者原凶魔干眞束形帝君敢不從命所誅無蠲屠肝刳腹斬首滅根北鑊漬湯南陵火燌金眞録氣流鈴捕魂妖爽無遺極盡形源身佩天書道行正文滌蕩九炁清明三元玄虚舉眞上合自然莫有干試攺動上聞畢引氣十二咽止右智慧拂魔之祝凡是學士遊行名山在百鬼之間獨宿震怖及嬰抱疾病羣鬼守門誦之一過將以鑊湯之消氷炎上之洋金也魂神澄正氣安體彊自非禀命之應終求死不可得矣上清修行經訣終
